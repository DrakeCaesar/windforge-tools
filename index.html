<!doctype html>
<html lang="en" class="app-boot-pending">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Windforge ItemList</title>
    <!-- Hide UI until catalog + first render complete (avoids unstyled / empty-table flash before the module runs). -->
    <style>
      html.app-boot-pending {
        background: #0f1218;
      }
      html.app-boot-pending body {
        visibility: hidden !important;
      }
    </style>
  </head>
  <body>
    <header class="top">
      <div class="controls">
        <div class="top__title-block">
          <h1>Windforge items</h1>
          <span id="count" class="count"></span>
        </div>
        <label>
          Search
          <input
            type="search"
            id="q"
            placeholder="Item name or display name…"
            autocomplete="off"
          />
        </label>
        <label>
          Object type
          <div class="object-type-dropdown" id="object-type-dropdown-root">
            <button
              type="button"
              id="filter-object-type-btn"
              class="object-type-dropdown__btn"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="filter-object-type-panel"
            >
              <span id="filter-object-type-label">All object types</span>
            </button>
            <div
              id="filter-object-type-panel"
              class="object-type-dropdown__panel"
              hidden
              role="listbox"
              aria-labelledby="filter-object-type-btn"
            ></div>
            <select
              id="filter-object-type"
              class="object-type-filter-select-hidden"
              tabindex="-1"
              aria-hidden="true"
            ></select>
          </div>
        </label>
        <label>
          Sort mode
          <div
            class="object-type-dropdown object-type-dropdown--compact"
            id="secondary-sort-dropdown-root"
          >
            <button
              type="button"
              id="secondary-sort-btn"
              class="object-type-dropdown__btn"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-controls="secondary-sort-panel"
            >
              <span id="secondary-sort-label">Alphabetical</span>
            </button>
            <div
              id="secondary-sort-panel"
              class="object-type-dropdown__panel"
              hidden
              role="listbox"
              aria-labelledby="secondary-sort-btn"
            ></div>
            <select
              id="secondary-sort"
              class="object-type-filter-select-hidden"
              tabindex="-1"
              aria-hidden="true"
            >
              <option value="name">Alphabetical (internal name)</option>
              <option value="recipeBase">Recipe order (internal name column)</option>
            </select>
          </div>
        </label>
        <label>
          Wisdom
          <span class="number-input-spin">
            <input
              type="number"
              id="wisdom-stat"
              min="0"
              max="100"
              step="1"
              value="0"
            />
            <span class="number-input-spin__btns" aria-hidden="true">
              <button
                type="button"
                class="number-input-spin__btn number-input-spin__btn--up"
                tabindex="-1"
                aria-label="Increase wisdom"
              ></button>
              <button
                type="button"
                class="number-input-spin__btn number-input-spin__btn--down"
                tabindex="-1"
                aria-label="Decrease wisdom"
              ></button>
            </span>
          </span>
        </label>
        <div class="special-filters">
          <label
            class="controls-checkbox-row"
          >
            <input type="checkbox" id="hide-special-items" />
            <span>Hide Special Items</span>
          </label>

          <label
            class="controls-checkbox-row"
          >
            <input type="checkbox" id="show-special-only" />
            <span>Show Special Only</span>
          </label>
        </div>

        <div class="special-filters">
          <label
            class="controls-checkbox-row"
          >
            <input type="checkbox" id="hide-normal-tier" />
            <span>Hide Normal</span>
          </label>
          <label
            class="controls-checkbox-row"
          >
            <input type="checkbox" id="hide-quality-tier" />
            <span>Hide Quality</span>
          </label>
          <label
            class="controls-checkbox-row"
          >
            <input type="checkbox" id="hide-mastercraft-tier" />
            <span>Hide MasterCraft</span>
          </label>
        </div>
      </div>
    </header>

    <details class="clothing-loadout-details" id="clothing-loadout-details">
      <summary class="clothing-loadout-details__summary">Clothing loadout planner</summary>
      <div id="clothing-loadout-panel" class="clothing-loadout-details__panel"></div>
    </details>

    <main>
      <div class="table-wrap" id="table-root">
        <div class="table-split">
          <div class="table-x-scroll">
            <div class="table-x-scroll-inner">
              <div class="table-head-wrap">
                <table class="wiki-table wiki-table-head">
                  <colgroup id="colgroup-head"></colgroup>
                  <thead id="thead"></thead>
                </table>
              </div>
              <div class="table-body-scroll" id="table-body-scroll">
                <table class="wiki-table wiki-table-body">
                  <colgroup id="colgroup-body"></colgroup>
                  <tbody id="tbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div id="recipe-tooltip" class="recipe-tooltip" hidden role="tooltip"></div>
    <div
      id="recipe-tooltip-sub"
      class="recipe-tooltip recipe-tooltip--nested"
      hidden
      role="tooltip"
    ></div>
    <div
      id="recipe-tooltip-deep"
      class="recipe-tooltip recipe-tooltip--nested"
      hidden
      role="tooltip"
    ></div>

    <div
      id="sort-precalc-debug"
      class="sort-precalc-debug"
      hidden
      aria-live="polite"
    >
      <div class="sort-precalc-debug__title">Sort precompute (debug)</div>
      <div class="sort-precalc-debug__stats">
        <span id="sort-precalc-count">0</span> /
        <span id="sort-precalc-total">0</span>
      </div>
      <div
        id="sort-precalc-bar"
        class="sort-precalc-debug__bar"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div id="sort-precalc-bar-fill" class="sort-precalc-debug__fill"></div>
      </div>
    </div>

    <dialog
      id="json-dialog"
      class="json-dialog"
      aria-labelledby="json-dialog-title"
    >
      <div class="json-dialog-head">
        <span id="json-dialog-title">Raw item data</span>
        <button
          type="button"
          id="json-dialog-close"
          class="json-dialog-close"
          aria-label="Close"
        >
          ×
        </button>
      </div>
      <pre id="json-dialog-pre" class="json-dialog-pre"></pre>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
