<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Windforge ItemList</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="top">
    <div class="controls">
      <h1>Windforge items</h1>
      <label>
        Search
        <input type="search" id="q" placeholder="Name, type, description, icon colour names…" autocomplete="off" />
      </label>
      <label>
        Object type
        <div class="object-type-dropdown" id="object-type-dropdown-root">
          <button
            type="button"
            id="filter-object-type-btn"
            class="object-type-dropdown__btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="filter-object-type-panel"
          >
            <span id="filter-object-type-label">All object types</span>
          </button>
          <div
            id="filter-object-type-panel"
            class="object-type-dropdown__panel"
            hidden
            role="listbox"
            aria-labelledby="filter-object-type-btn"
          ></div>
          <select
            id="filter-object-type"
            class="object-type-filter-select-hidden"
            tabindex="-1"
            aria-hidden="true"
            title="Filter by objectType"
          ></select>
        </div>
      </label>
      <label>
        Sort mode
        <div class="object-type-dropdown object-type-dropdown--compact" id="secondary-sort-dropdown-root">
          <button
            type="button"
            id="secondary-sort-btn"
            class="object-type-dropdown__btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="secondary-sort-panel"
          >
            <span id="secondary-sort-label">Alphabetical</span>
          </button>
          <div
            id="secondary-sort-panel"
            class="object-type-dropdown__panel"
            hidden
            role="listbox"
            aria-labelledby="secondary-sort-btn"
          ></div>
          <select
            id="secondary-sort"
            class="object-type-filter-select-hidden"
            tabindex="-1"
            aria-hidden="true"
            title="Recipe-base mode groups Quality/MasterCraft variants by base item name, then sorts alphabetically within each family."
          >
            <option value="name">Alphabetical</option>
            <option value="recipeBase">Recipe base, then alphabetical</option>
          </select>
        </div>
      </label>
      <label title="Character wisdom stat used for store price adjustment">
        Wisdom
        <span class="number-input-spin">
          <input type="number" id="wisdom-stat" min="0" max="100" step="1" value="0" />
          <span class="number-input-spin__btns" aria-hidden="true">
            <button
              type="button"
              class="number-input-spin__btn number-input-spin__btn--up"
              tabindex="-1"
              title="Increase wisdom"
              aria-label="Increase wisdom"
            ></button>
            <button
              type="button"
              class="number-input-spin__btn number-input-spin__btn--down"
              tabindex="-1"
              title="Decrease wisdom"
              aria-label="Decrease wisdom"
            ></button>
          </span>
        </span>
      </label>
      <div class="special-filters" title="Special-items filters">
        <label
          class="controls-checkbox-row"
          title="When checked, hide UnknownIcon items, Debug/Test items, and Paratrooper red Torso clothing (IconRed1/IconRed2)."
        >
          <input type="checkbox" id="hide-special-items" />
          <span>Hide Special Items</span>
        </label>

        <label
          class="controls-checkbox-row"
          title="When checked, show only UnknownIcon items, Debug/Test items, and Paratrooper red Torso clothing (IconRed1/IconRed2)."
        >
          <input type="checkbox" id="show-special-only" />
          <span>Show Special Only</span>
        </label>
      </div>

      <div class="special-filters" title="Hide crafted tier variants">
        <label
          class="controls-checkbox-row"
          title="Hide normal tier craft items (only when a full Normal/Quality/MasterCraft family exists and the item has a recipe)."
        >
          <input type="checkbox" id="hide-normal-tier" />
          <span>Hide Normal</span>
        </label>
        <label
          class="controls-checkbox-row"
          title="Hide quality tier craft items (only when a full Normal/Quality/MasterCraft family exists and the item has a recipe)."
        >
          <input type="checkbox" id="hide-quality-tier" />
          <span>Hide Quality</span>
        </label>
        <label
          class="controls-checkbox-row"
          title="Hide mastercraft tier craft items (only when a full Normal/Quality/MasterCraft family exists and the item has a recipe)."
        >
          <input type="checkbox" id="hide-mastercraft-tier" />
          <span>Hide MasterCraft</span>
        </label>
      </div>
      <span id="count" class="count"></span>
    </div>
  </header>

  <main>
    <div class="table-wrap" id="table-root">
      <div class="table-split">
        <div class="table-x-scroll">
          <div class="table-x-scroll-inner">
            <div class="table-head-wrap">
              <table class="wiki-table wiki-table-head">
                <colgroup id="colgroup-head"></colgroup>
                <thead id="thead"></thead>
              </table>
            </div>
            <div class="table-body-scroll" id="table-body-scroll">
              <table class="wiki-table wiki-table-body">
                <colgroup id="colgroup-body"></colgroup>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="recipe-tooltip" class="recipe-tooltip" hidden role="tooltip"></div>

  <dialog id="json-dialog" class="json-dialog" aria-labelledby="json-dialog-title">
    <div class="json-dialog-head">
      <span id="json-dialog-title">Raw item data</span>
      <button type="button" id="json-dialog-close" class="json-dialog-close" aria-label="Close">×</button>
    </div>
    <pre id="json-dialog-pre" class="json-dialog-pre"></pre>
  </dialog>

  <script src="colors.js"></script>
  <script src="recipe-sort.js"></script>
  <script src="app.js"></script>
</body>
</html>
